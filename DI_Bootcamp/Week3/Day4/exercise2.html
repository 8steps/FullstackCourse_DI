<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Exercise 2</title>
</head>
<body>

  <form>
    <label for="fname">First name:</label><br>
    <input type="text" id="fname" name="firstname"><br>
    <label for="lname">Last name:</label><br>
    <input type="text" id="lname" name="lastname"><br><br>
    <input type="submit" value="Submit" id="submit">
  </form>
  <ul class="usersAnswer"></ul>

  <script>
    const form = document.querySelector('form');
    console.log(form);

    const fname = document.getElementById('fname');
    const lname = document.getElementById('lname');
    console.log(fname, lname);

    const fnameByName = document.getElementsByName('firstname')[0];
    const lnameByName = document.getElementsByName('lastname')[0];
    console.log(fnameByName, lnameByName);

    const usersAnswerList = document.querySelector('.usersAnswer');

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const firstNameValue = fname.value.trim();
      const lastNameValue = lname.value.trim();

      if (firstNameValue === '' || lastNameValue === '') {
        alert('Please fill in both fields.');
        return;
      }

      const firstNameItem = document.createElement('li');
      firstNameItem.textContent = firstNameValue;

      const lastNameItem = document.createElement('li');
      lastNameItem.textContent = lastNameValue;

      usersAnswerList.appendChild(firstNameItem);
      usersAnswerList.appendChild(lastNameItem);

      form.reset();
    });
  </script>

</body>
</html>
